schema: spec-driven

context: |
  An event-sourced music importer, sibling to music-downloader (same constitution).
  Tech stack: Node >=24, TypeScript strict, pnpm, neverthrow (errors as values), zod, Fastify,
  pino, vitest (100% coverage enforced), SQLite (better-sqlite3), beets driven via a stateless
  Python bridge CLI behind an outbound port.
  Architecture: layered + hexagonal; pure domain (decide/evolve/react decider); dependency rule
  lint-enforced; vanilla DI in src/composition.
  Conventions: conventional commits, jj (jujutsu) for VCS, trunk-based with PR gate
  (version:prep --check, quality, test), release on merge to main (Docker image to GHCR, tag,
  GitHub Release). Public API is additive-only within a version.
  Cross-tool contracts: producer-owned event schemas (each repo owns events it emits, publishes
  JSON Schema + frozen fixtures); consumers are tolerant readers behind an anti-corruption layer.
