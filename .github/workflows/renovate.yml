# Self-hosted Renovate (design D4): keeps the exact runtime pins current without a third-party app
# in the trust boundary — Renovate runs here, in our own CI, using a scoped token we control.
#
# Managers auto-detected against this repo:
#   nvm             -> .nvmrc                (exact Node pin)
#   dockerfile      -> node:<x.y.z>-slim     (base image; grouped with .nvmrc via renovate.json)
#   npm             -> package.json / lockfile (incl. @types/node, kept in its ^24 major)
#   github-actions  -> .github/workflows/*.yml (action versions)
#
# One-time setup (outside this repo's code):
#   Create a token with rights to open PRs AND edit workflow files, then add it as the repo secret
#   RENOVATE_TOKEN. Because Renovate updates files under .github/workflows/, the default GITHUB_TOKEN
#   is NOT sufficient — use either:
#     - a classic PAT with `repo` + `workflow` scopes, or
#     - a GitHub App installation token (Contents + Pull requests + Workflows: write).
name: Renovate

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      logLevel:
        description: Renovate log level
        default: info
        type: string

concurrency: renovate

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Self-hosted Renovate
        # This action publishes only full-version tags (no floating major), so pin the exact version.
        # Renovate keeps this pin updated once it is running.
        uses: renovatebot/github-action@v46.1.17
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
