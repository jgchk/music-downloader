name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Quality gate — static checks that need no runtime dependencies; runs in parallel with tests.
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Format
        run: pnpm run format
      - name: Lint (incl. dependency-rule boundaries)
        run: pnpm run lint
      - name: Typecheck
        run: pnpm run typecheck
      - name: Build
        run: pnpm run build

  # Test pyramid — unit » integration » e2e in one coverage run; the OpenAPI snapshot is the
  # breaking-change contract test. ffmpeg is a real dependency of the audio-probe adapter tests.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Test @ 100% coverage
        run: pnpm run test:cov
      - name: Contract tests (frozen fixtures; no network)
        run: pnpm run test:contract
