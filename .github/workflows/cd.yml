name: CD

on:
  push:
    branches: [main]

concurrency: cd-${{ github.ref }}

permissions:
  contents: write # create tags, releases, commit the changelog
  issues: write
  pull-requests: write
  packages: write # push the GHCR image

jobs:
  # Conventional-commits → version bump + CHANGELOG + GitHub Release (semantic-release).
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # semantic-release needs full history to analyze commits
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          npx --yes
          -p semantic-release
          -p @semantic-release/changelog
          -p @semantic-release/git
          semantic-release

  # Build the ffmpeg-baked image, gate it through the out-of-process E2E tier, then push to GHCR.
  # Publishing is conditional on the tier passing (change: add-out-of-process-e2e).
  image:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha

      # Build once, load locally as `music-downloader:e2e`, cache to gha so the publish step below
      # reuses the exact same layers (no rebuild).
      - name: Build image (load, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: music-downloader:e2e
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Node/pnpm to run the host-side suite that drives the container over HTTP.
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # THE GATE: stand up the freshly built image + WireMock stubs, drive it end to end over a real
      # socket, tear down. A failure here fails the job and blocks the publish step below.
      - name: Out-of-process E2E gate
        env:
          E2E_SKIP_BUILD: '1'
        run: pnpm test:e2e

      # Publish only after the gate is green — reuses the gha cache, so this is a fast no-rebuild push.
      - name: Publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
